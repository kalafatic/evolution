<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Evolution Servers</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">
    <div class="login-card window-frame">
        <div class="title-bar">
            <span>Log On to Evolution</span>
        </div>
        <div class="login-content">
            <div style="margin-bottom: 20px;">
                <span style="font-size: 24px; color: #003399; font-weight: 700;">Evolution</span>
                <p style="font-size: 10px; color: #4D4E4F;">Professional Intelligence Platform</p>
            </div>

            <div id="loader" style="display:none; margin-bottom: 10px;">Authenticating...</div>
            <div id="errorArea" style="color: #FF0000; font-size: 11px; font-weight: 700;"></div>

            <form id="loginForm">
                <div style="text-align: left; margin-bottom: 5px;">User name:</div>
                <input type="text" id="username" name="username" class="login-input" required>

                <div style="text-align: left; margin-bottom: 5px;">Password:</div>
                <input type="password" id="password" name="password" class="login-input" required>

                <div style="display: flex; align-items: center; gap: 5px; margin: 15px 0; font-size: 11px;">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <div style="text-align: right; margin-top: 20px; border-top: 1px solid #D8D2BD; padding-top: 10px;">
                    <button type="submit" id="loginBtn" class="login-btn">OK</button>
                    <button type="reset" class="login-btn" style="margin-left: 5px;">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    <script src="/js/auth.js"></script>
</body>
</html>
