<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log On to Evolution</title>
    <link rel="stylesheet" href="/evolution.css">
</head>
<body class="xp-theme" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div class="window-frame" style="width: 420px;">
        <div class="title-bar">
            <div class="title-text">Log On to Evolution</div>
            <div class="title-controls">
                <div class="control-btn">?</div>
                <div class="control-btn close">X</div>
            </div>
        </div>
        <div style="background: var(--xp-bg); padding: 20px;">
            <div style="display: flex; gap: 20px; align-items: flex-start; margin-bottom: 20px;">
                <div style="font-size: 40px;">🧬</div>
                <div>
                    <h2 style="margin: 0; color: #003399;">Evolution</h2>
                    <p style="margin: 0; font-size: 11px;">Professional Intelligence Platform</p>
                    <p style="margin: 10px 0 0 0; font-size: 12px; font-weight: bold;">Enter your credentials to access the portal.</p>
                </div>
            </div>

            <div id="errorArea" style="color: #D32F2F; margin-bottom: 10px; font-size: 11px; height: 15px; text-align: center;"></div>

            <form id="loginForm">
                <table style="width: 100%; border-spacing: 0 10px;">
                    <tr>
                        <td style="width: 100px; font-size: 12px;">User name:</td>
                        <td><input type="text" id="username" name="username" style="width: 100%;" required autofocus></td>
                    </tr>
                    <tr>
                        <td style="font-size: 12px;">Password:</td>
                        <td><input type="password" id="password" name="password" style="width: 100%;" required></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 5px;">
                                <input type="checkbox" id="rememberMe" name="rememberMe">
                                <label for="rememberMe" style="font-size: 11px;">Remember my credentials</label>
                            </div>
                        </td>
                    </tr>
                </table>

                <div style="margin-top: 20px; display: flex; justify-content: flex-end; gap: 8px;">
                    <button type="submit" id="loginBtn" style="min-width: 75px;">OK</button>
                    <button type="button" style="min-width: 75px;">Cancel</button>
                    <button type="button" style="min-width: 75px;">Options >></button>
                </div>
            </form>

            <div id="loader" style="display:none; margin-top: 10px; text-align: center; font-size: 11px; color: #666;">
                Verifying credentials...
            </div>
        </div>
        <div style="background: #003399; height: 4px;"></div>
    </div>
    <script src="/evolution.js"></script>
</body>
</html>
