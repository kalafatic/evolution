<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Evolution Architecture Map</title>
    <base href="{{BASE_URL}}">
    <link rel="stylesheet" href="/shared.css">
    <link rel="stylesheet" href="/architecture.css">
    <link rel="stylesheet" href="/creatic.css">
    <script src="/auth-integration.js"></script>
	<script>
	       // Diagnostic JavaLog Bridge
	       window.onerror = function(msg, url, line, col, error) {
	           if (window.JavaLog) window.JavaLog('[JS Error] ' + msg + ' at ' + line + ':' + col);
	           return false;
	       };

	       // Resilience: fallback for loading overlay
	       window.hideLoading = function() {
	           var overlay = document.getElementById('loading-overlay');
	           if (overlay) overlay.style.display = 'none';
	       };
	       setTimeout(window.hideLoading, 5000);
	   </script>
</head>
<body>
    <div id="layout">
        <div id="sidebar">
            <h1>🧬 Architecture</h1>

            <div class="sidebar-section">
                <h2>✨ Guidance</h2>
                <div id="guidance-content" style="font-size: 0.85em; color: var(--text-dim); line-height: 1.4;">
                    Analyzing context...
                </div>
            </div>

            <div class="sidebar-section">
                <h2>Target</h2>
                <div class="control-group">
                    <div style="display:flex; gap:5px;" data-guidance="Select the target repository or module directory to analyze. Use the folder icon to browse the local filesystem.">
                        <select id="target-select" onchange="javaAction(this.value, 'SET_TARGET')" style="flex:1;">
                            <!-- Populated by JS -->
                        </select>
                        <button class="btn btn-sm" onclick="javaAction('', 'BROWSE_TARGET')" style="width:auto;">📁</button>
                    </div>
                    <input type="text" id="target-path-input" style="width: 100%; margin-top: 2px;" placeholder="Target path..." onchange="javaAction(this.value, 'SET_TARGET')">
                    <button class="btn btn-primary" onclick="javaAction('', 'DISCOVER')" data-guidance="Trigger architecture discovery. EVO will scan the target directory for components, dependencies, and metadata.">🔍 Discover Architecture</button>
                </div>
            </div>

            <div class="sidebar-section">
                <h2>View</h2>
                <div class="control-group">
                    <select id="mode-select" onchange="javaAction(this.value, 'SET_VIEW_MODE')" data-guidance="Switch between different architectural perspectives: components, subsystems, use cases, or the full knowledge graph.">
                        <option value="COMPONENTS">Components Map</option>
                        <option value="SUBSYSTEMS">Subsystems View</option>
                        <option value="USE_CASES">Use Cases Trace</option>
                        <option value="KNOWLEDGE_GRAPH">Knowledge Graph</option>
                    </select>

                    <button class="btn" onclick="javaAction('', 'REFRESH')">🔄 Refresh View</button>
                </div>
            </div>

            <div class="sidebar-section">
                <h2>Milestones</h2>
                <div class="control-group">
                    <select id="snapshot-select" onchange="javaAction(this.value, 'SELECT_SNAPSHOT')" data-guidance="Switch between the current live architecture and historical genome milestones.">
                        <option value="">Current (Live Architecture)</option>
                    </select>
                    <button class="btn btn-primary" onclick="javaAction('', 'GENERATE_MILESTONE')" data-guidance="Generate a new genome milestone, creating a historical snapshot of the current architecture and AI documentation.">🏁 Generate Milestone</button>
                </div>
            </div>

            <div class="sidebar-section">
                <h2>Tools</h2>
                <div class="control-group">
                    <button class="btn btn-primary" onclick="javaAction('', 'UPDATE_GENOME')" data-guidance="Trigger the Genome Update Agent to synchronize documentation with the current project state, create a historical snapshot, and update AI indexes.">🧬 Update genome</button>
                    <button class="btn" onclick="javaAction('', 'GENERATE_METADATA')">📝 Generate AI Metadata</button>
                    <button class="btn" onclick="javaAction('', 'EXPORT_HTML')">📤 Export as HTML</button>
                    <button class="btn" onclick="javaAction('', 'SAVE_JSON')">💾 Save Design JSON</button>
                </div>
            </div>

            <div style="margin-top: auto; font-size: 10px; opacity: 0.5;">
                <span>Evolution Architecture v2.7.0</span>
            </div>
        </div>

        <div id="main-container">
            <div id="header">
                <div style="font-weight: 600; font-size: 14px;" id="project-title">Loading Architecture...</div>
                <div style="font-size: 11px; color: var(--text-dim);">Forge Graph Engine</div>
            </div>

            <div id="architecture-container">
                <svg id="architecture-svg">
                    <defs>
                        <marker id="arrowhead" viewBox="-0 -5 10 10" refX="20" refY="0" orient="auto" markerWidth="6" markerHeight="6" xoverflow="visible">
                            <path d="M 0,-5 L 10 ,0 L 0,5" fill="#555" style="stroke: none;"></path>
                        </marker>
                    </defs>
                </svg>

                <div id="zoom-controls">
                    <button class="zoom-btn" onclick="zoomIn()" title="Zoom In">+</button>
                    <button class="zoom-btn" onclick="zoomOut()" title="Zoom Out">−</button>
                    <button class="zoom-btn" onclick="resetZoom()" title="Reset Zoom">⊙</button>
                </div>

                <div id="empty-state">
                    <h1 style="font-size: 20px; margin-bottom: 10px;">No Architecture Data</h1>
                    <p style="font-size: 0.9em;">Run <b>Deep Discovery</b> to analyze project structure.</p>
                </div>

                <div id="details-panel">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <div id="context-menu"></div>

    <div id="popup-panel">
        <div id="popup-header">
            <h3 id="popup-title" style="margin:0; font-size: 1em;">Popup</h3>
            <button onclick="document.getElementById('popup-panel').style.display='none'" class="btn btn-sm" style="background:none;">&times;</button>
        </div>
        <div id="popup-content"></div>
    </div>

    <script src="creatic.js"></script>
    <script>
        function log(msg) { if (window.logFunction) window.logFunction(msg); else console.log(msg); }

        function getBaseUrl() {
            if (window.location.protocol === 'file:') {
                return 'http://localhost:48080';
            }
            return '';
        }

        window.INITIAL_MODEL = {{MODEL_JSON}};
        window.CURRENT_VIEW_MODE = {{VIEW_MODE_JSON}};
        window.TARGET_PATH = {{TARGET_PATH_JSON}};
        window.DEFAULT_PATH = {{DEFAULT_PATH_JSON}};
        window.TARGET_HISTORY = {{TARGET_HISTORY_JSON}};
        window.SNAPSHOTS = {{SNAPSHOTS_JSON}};
        window.CURRENT_SNAPSHOT = {{CURRENT_SNAPSHOT_JSON}};

        function initUI() {
            log('Initializing UI elements...');
            updateSidebar({
                mode: window.CURRENT_VIEW_MODE,
                target: window.TARGET_PATH,
                defaultTarget: window.DEFAULT_PATH,
                history: window.TARGET_HISTORY,
                snapshots: window.SNAPSHOTS,
                currentSnapshot: window.CURRENT_SNAPSHOT
            });

            if (window.INITIAL_MODEL && window.INITIAL_MODEL.name) {
                var projectTitle = document.getElementById('project-title');
                if (projectTitle) projectTitle.innerText = window.INITIAL_MODEL.name;
            }
        }

        window.updateSidebar = function(data) {
            log('Updating sidebar...');
            if (data.mode) {
                var modeSelect = document.getElementById('mode-select');
                if (modeSelect) modeSelect.value = data.mode;
            }

            if (data.target) {
                var targetInput = document.getElementById('target-path-input');
                if (targetInput) targetInput.value = data.target;
            }

            if (data.history) {
                var targetSelect = document.getElementById('target-select');
                if (targetSelect) {
                    targetSelect.innerHTML = '';
                    for (var i = 0; i < data.history.length; i++) {
                        var path = data.history[i];
                        var opt = document.createElement('option');
                        opt.value = path;
                        var displayPath = path;
                        if (path === data.defaultTarget) {
                            displayPath = "EVO (default): " + path;
                        }
                        opt.text = displayPath;
                        if (path === data.target) opt.selected = true;
                        targetSelect.appendChild(opt);
                    }
                }
            }

            if (data.snapshots) {
                var snapSelect = document.getElementById('snapshot-select');
                if (snapSelect) {
                    snapSelect.innerHTML = '<option value="">Current (Live Architecture)</option>';
                    for (var j = 0; j < data.snapshots.length; j++) {
                        var s = data.snapshots[j];
                        var opt = document.createElement('option');
                        opt.value = s.timestamp;
                        opt.text = "genome_" + s.timestamp;
                        if (s.timestamp === data.currentSnapshot) opt.selected = true;
                        snapSelect.appendChild(opt);
                    }
                }
            }
        };

    </script>
    <script src="js/navigator.js"></script>
    <script>
        window.onload = function(event) {
            log('ready');
            initUI();
            if (window.INITIAL_MODEL && window.INITIAL_MODEL.components && window.INITIAL_MODEL.components.length > 0) {
                log('Rendering initial model...');
                if (window.updateGraph) {
                    window.updateGraph(window.INITIAL_MODEL);
                } else {
                    log('ERROR: updateGraph not found on load');
                    setTimeout(function() {
                        if (window.updateGraph) {
                            log('Retrying rendering initial model...');
                            window.updateGraph(window.INITIAL_MODEL);
                        }
                    }, 500);
                }
            }
        };
    </script>
</body>
</html>
