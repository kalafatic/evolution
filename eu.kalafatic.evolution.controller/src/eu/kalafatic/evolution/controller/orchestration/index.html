<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Evolution AI</title>
    <style>
        :root {
            --bg-canvas: #f1f5f9;
            --sidebar-bg: #1e293b;
            --sidebar-text: #f8fafc;
            --accent: #3b82f6;
            --chat-bg: #ffffff;
            --text-main: #334155;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; display: flex; height: 100vh;
            background-color: var(--bg-canvas);
            color: var(--text-main);
        }

        #sidebar {
            width: 260px; background-color: var(--sidebar-bg);
            color: var(--sidebar-text); display: flex; flex-direction: column;
            padding: 20px; box-sizing: border-box;
        }

        #sidebar h1 { font-size: 20px; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .nav-item {
            padding: 10px; margin-bottom: 5px; cursor: pointer; border-radius: 6px;
            transition: background 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: var(--accent); }

        #main-content {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
        }

        #header {
            height: auto; min-height: 60px; background: white; border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 10px 20px;
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px; }
        .header-bottom { display: flex; gap: 15px; align-items: center; width: 100%; font-size: 13px; }

        .server-badges { display: flex; gap: 10px; }

        #chat-area {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }

        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; }
        .message.user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .message.ai { align-self: flex-start; background: white; border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        #input-area {
            padding: 20px; background: white; border-top: 1px solid var(--border);
            display: flex; gap: 10px;
        }

        #input-area input {
            flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 8px; outline: none;
        }
        #input-area input:focus { border-color: var(--accent); }
        #input-area button {
            padding: 0 20px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer;
        }

        .status-badge {
            padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold;
        }
        .status-online { background: #dcfce7; color: #166534; }

        pre { background: #f8fafc; padding: 10px; border-radius: 6px; overflow-x: auto; }
        code { font-family: monospace; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h1>🧬 Evolution</h1>
        <div class="nav-item active"><span>💬</span> Chat</div>
        <div class="nav-item"><span>📂</span> Workspace</div>
        <div class="nav-item"><span>⚖️</span> Review</div>
        <div class="nav-item"><span>⚙️</span> Settings</div>

        <div style="margin-top: auto; font-size: 12px; opacity: 0.6;">
            Evolution Server v1.0.0
        </div>
    </div>

    <div id="main-content">
        <div id="header">
            <div class="header-top">
                <div style="font-weight: bold;">Current Task: New Orchestration</div>
                <div class="server-badges">
                    <div id="ollama-status" class="status-badge">OLLAMA ...</div>
                    <div class="status-badge status-online">SERVER ONLINE</div>
                </div>
            </div>
            <div class="header-bottom">
                <div style="display: flex; align-items: center; gap: 5px;">
                    <label for="model-select">🤖 Model:</label>
                    <select id="model-select" style="padding: 4px; border-radius: 4px; border: 1px solid var(--border); min-width: 120px;">
                        <option value="">Loading...</option>
                    </select>
                </div>
                <div style="display: flex; align-items: center; gap: 5px;">
                    <label for="branch-select">🌿 Branch:</label>
                    <select id="branch-select" style="padding: 4px; border-radius: 4px; border: 1px solid var(--border); min-width: 120px;">
                        <option value="">Auto-create</option>
                    </select>
                </div>
                <div style="display: flex; align-items: center; gap: 5px; margin-left: auto;">
                    <label for="root-input">📁 Root:</label>
                    <input type="text" id="root-input" placeholder="Project Root Path" style="padding: 4px; border-radius: 4px; border: 1px solid var(--border); width: 200px;">
                    <button onclick="refreshBranches()" style="padding: 4px 8px; font-size: 12px; border-radius: 4px; background: #e2e8f0; border: none; cursor: pointer;">Refresh</button>
                </div>
            </div>
        </div>

        <div id="chat-area">
            <div class="message ai">
                Hello! I am Evo, your Evolution AI assistant. How can I help you with your project today?
            </div>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Ask Evo something..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');
        let currentTaskId = null;

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.innerText = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            const model = document.getElementById('model-select').value;
            const branch = document.getElementById('branch-select').value;
            const root = document.getElementById('root-input').value;

            appendMessage('user', text + (branch ? ` [Branch: ${branch}]` : ''));
            userInput.value = '';

            try {
                const payload = { prompt: text };
                if (model) payload.model = model;
                if (branch) payload.branch = branch;
                if (root) payload.projectRoot = root;

                const response = await fetch('/task', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                currentTaskId = data.id;
                pollTask(currentTaskId);
            } catch (err) {
                appendMessage('ai', 'Error: ' + err.message);
            }
        }

        async function pollServerStatus() {
            try {
                const response = await fetch('/server/status');
                const data = await response.json();

                // Update Badge
                const ollamaBadge = document.getElementById('ollama-status');
                if (data.ollama && data.ollama.online) {
                    ollamaBadge.innerText = 'OLLAMA ONLINE';
                    ollamaBadge.style.background = '#dcfce7';
                    ollamaBadge.style.color = '#166534';

                    // Update Model Selection if empty or "Loading..."
                    const modelSelect = document.getElementById('model-select');
                    if (data.ollama.models && data.ollama.models.length > 0) {
                        const currentVal = modelSelect.value;
                        if (!currentVal || modelSelect.options[0].text === 'Loading...') {
                            modelSelect.innerHTML = '';
                            data.ollama.models.forEach(m => {
                                const opt = document.createElement('option');
                                opt.value = m.name;
                                opt.text = m.name;
                                modelSelect.appendChild(opt);
                            });
                            if (currentVal && Array.from(modelSelect.options).some(o => o.value === currentVal)) {
                                modelSelect.value = currentVal;
                            }
                        }
                    } else if (modelSelect.options[0].text === 'Loading...') {
                        modelSelect.innerHTML = '<option value="">No models found</option>';
                    }
                } else {
                    ollamaBadge.innerText = 'OLLAMA OFFLINE';
                    ollamaBadge.style.background = '#fee2e2';
                    ollamaBadge.style.color = '#991b1b';
                }
            } catch (err) {
                console.error('Failed to poll server status:', err);
            }
        }

        async function refreshBranches() {
            const root = document.getElementById('root-input').value;
            const branchSelect = document.getElementById('branch-select');
            branchSelect.innerHTML = '<option value="">Loading...</option>';

            try {
                let url = '/git/branches';
                if (root) url += '?root=' + encodeURIComponent(root);

                const response = await fetch(url);
                const branches = await response.json();

                branchSelect.innerHTML = '<option value="">Auto-create / Default</option>';
                if (Array.isArray(branches)) {
                    branches.forEach(b => {
                        const opt = document.createElement('option');
                        opt.value = b;
                        opt.text = b;
                        branchSelect.appendChild(opt);
                    });
                }
            } catch (err) {
                console.error('Failed to fetch branches:', err);
                branchSelect.innerHTML = '<option value="">Error loading branches</option>';
            }
        }

        setInterval(pollServerStatus, 5000);
        pollServerStatus();
        refreshBranches();

        async function pollTask(id) {
            const interval = setInterval(async () => {
                try {
                    const response = await fetch('/task/' + id);
                    const data = await response.json();

                    if (data.status === 'SUCCESS' || data.status === 'FAILED') {
                        clearInterval(interval);
                        appendMessage('ai', data.response || data.error);
                    } else if (data.logs && data.logs.length > 0) {
                        // In a real app we'd show logs separately or as small updates
                    }
                } catch (err) {
                    clearInterval(interval);
                }
            }, 1000);
        }
    </script>
</body>
</html>
