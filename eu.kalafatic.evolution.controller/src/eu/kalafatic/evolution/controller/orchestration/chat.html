<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Evolution Mirrored Chat</title>
    <style>
        :root {
            --bg-canvas: #f1f5f9;
            --sidebar-bg: #1e293b;
            --sidebar-text: #f8fafc;
            --accent: #3b82f6;
            --chat-bg: #ffffff;
            --text-main: #334155;
            --border: #e2e8f0;
            --user-bg: #3b82f6;
            --ai-bg: #ffffff;
            --progress-bg: #f8fafc;
            --waiting-bg: #fff7ed;
            --error-bg: #fef2f2;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; display: flex; height: 100vh;
            background-color: var(--bg-canvas);
            color: var(--text-main);
        }

        #sidebar {
            width: 300px; background-color: var(--sidebar-bg);
            color: var(--sidebar-text); display: flex; flex-direction: column;
            padding: 15px; box-sizing: border-box; font-size: 14px;
        }

        #sidebar h1 { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .sidebar-section { margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .sidebar-section h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 10px; }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-item { display: flex; align-items: center; justify-content: space-between; gap: 5px; }

        select, input[type="text"], input[type="number"] {
            width: 100%; padding: 6px; border-radius: 4px; border: 1px solid var(--border); background: white; color: var(--text-main); font-size: 13px;
        }

        .checkbox-group { display: flex; align-items: center; gap: 8px; cursor: pointer; }

        #main-content {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
        }

        #header {
            height: 60px; background: white; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
        }

        .status-badge {
            padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold;
        }
        .status-online { background: #dcfce7; color: #166534; }
        .status-offline { background: #fee2e2; color: #991b1b; }

        #chat-area {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
        }

        .message { max-width: 85%; padding: 10px 14px; border-radius: 8px; line-height: 1.5; font-size: 14px; position: relative; }
        .message.user { align-self: flex-end; background: var(--user-bg); color: white; border-bottom-right-radius: 2px; }
        .message.ai { align-self: flex-start; background: var(--ai-bg); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
        .message.progress { align-self: flex-start; background: var(--progress-bg); font-style: italic; opacity: 0.8; }
        .message.waiting { align-self: flex-start; background: var(--waiting-bg); border: 1px solid #fbbf24; }
        .message.error { align-self: center; background: var(--error-bg); border: 1px solid #ef4444; color: #b91c1c; }

        .message-meta { font-size: 10px; opacity: 0.5; margin-bottom: 4px; display: flex; justify-content: space-between; }

        #input-area {
            padding: 15px 20px; background: white; border-top: 1px solid var(--border);
            display: flex; gap: 10px; align-items: center;
        }

        #input-area input {
            flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 6px; outline: none;
        }
        #input-area button {
            padding: 8px 16px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;
        }
        #input-area button:hover { opacity: 0.9; }

        .approval-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .btn-approve { background: #10b981; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .btn-reject { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        .thinking-indicator {
            display: none; align-items: center; gap: 5px; font-size: 12px; color: var(--accent); margin-bottom: 10px;
        }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }

    </style>
</head>
<body>
    <div id="sidebar">
        <h1>🧬 Evolution <span style="font-size: 10px; background: #3b82f6; padding: 2px 5px; border-radius: 4px;">MIRROR</span></h1>

        <div class="sidebar-section">
            <h2>Chat Management</h2>
            <div class="control-group">
                <button onclick="newSession()" style="width: 100%; padding: 5px; font-size: 12px; cursor: pointer; background: var(--accent); color: white; border: none; border-radius: 4px;">New Session</button>
                <button onclick="cleanChat()" style="width: 100%; padding: 5px; font-size: 12px; cursor: pointer;">Clean Chat</button>
            </div>
        </div>

        <div class="sidebar-section">
            <h2>AI Mode & Models</h2>
            <div class="control-group">
                <div class="control-item">
                    <label>Mode:</label>
                    <select id="mode-select" onchange="updateSettings()">
                        <option value="Local">Local</option>
                        <option value="Hybrid">Hybrid</option>
                        <option value="Remote">Remote</option>
                        <option value="Mediated">Mediated</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>Local:</label>
                    <select id="local-model-select" onchange="updateSettings()">
                        <option value="">Loading...</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>Remote:</label>
                    <select id="remote-model-select" onchange="updateSettings()">
                        <option value="GPT-4o">GPT-4o</option>
                        <option value="Claude-3.5-Sonnet">Claude-3.5-Sonnet</option>
                        <option value="Llama-3-70b">Llama-3-70b</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="sidebar-section">
            <h2>Instructions</h2>
            <div class="control-group">
                <label class="checkbox-group">
                    <input type="checkbox" id="iterative-check" onchange="updateSettings()"> Iterative Mode
                </label>
                <label class="checkbox-group">
                    <input type="checkbox" id="self-iterative-check" onchange="updateSettings()"> Self-Development
                </label>
                <label class="checkbox-group">
                    <input type="checkbox" id="darwin-check" onchange="updateSettings()"> Darwin Mode
                </label>
                <label class="checkbox-group">
                    <input type="checkbox" id="step-check" onchange="updateSettings()"> Step Mode
                </label>
                <label class="checkbox-group">
                    <input type="checkbox" id="git-check" onchange="updateSettings()"> Git Automation
                </label>
                <label class="checkbox-group">
                    <input type="checkbox" id="auto-approve-check" onchange="updateSettings()"> Auto-Approve
                </label>
                <div class="control-item">
                    <label>Max Iter:</label>
                    <input type="number" id="max-iter-input" value="5" min="1" max="20" style="width: 60px;" onchange="updateSettings()">
                </div>
            </div>
        </div>

        <div class="sidebar-section">
            <h2>Workspace</h2>
            <div class="control-group">
                <div class="control-item">
                    <label>Branch:</label>
                    <select id="branch-select">
                        <option value="">Auto-create</option>
                    </select>
                </div>
                <div class="control-item">
                    <button onclick="refreshBranches()" style="width: 100%; padding: 5px; font-size: 12px; cursor: pointer;">Refresh Branches</button>
                </div>
            </div>
        </div>

        <div style="margin-top: auto; font-size: 11px; opacity: 0.6; display: flex; justify-content: space-between;">
            <span>v2.6.5</span>
            <span id="session-display">Session: Default</span>
        </div>
    </div>

    <div id="main-content">
        <div id="header">
            <div style="font-weight: 600; font-size: 15px;">Mirroring: <span id="current-task-name">Idle</span></div>
            <div style="display: flex; gap: 10px;">
                <div id="ollama-status" class="status-badge status-offline">OLLAMA OFFLINE</div>
                <div class="status-badge status-online">SERVER ONLINE</div>
            </div>
        </div>

        <div id="chat-area">
            <!-- Messages appear here -->
        </div>

        <div id="thinking" class="thinking-indicator" style="padding-left: 20px;">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <span>Evo is thinking...</span>
        </div>

        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type a message or response..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');
        const thinkingIndicator = document.getElementById('thinking');

        let currentSessionId = 'Default';
        let lastSequenceNumber = 0;
        let isPolling = false;

        async function fetchSettings() {
            try {
                const response = await fetch('/server/orchestrator/settings');
                const data = await response.json();

                document.getElementById('mode-select').value = data.aiMode || 'Local';
                document.getElementById('local-model-select').value = data.localModel || '';
                document.getElementById('remote-model-select').value = data.remoteModel || 'GPT-4o';

                document.getElementById('iterative-check').checked = data.iterativeMode;
                document.getElementById('self-iterative-check').checked = data.selfIterativeMode;
                document.getElementById('darwin-check').checked = data.darwinMode;
                document.getElementById('step-check').checked = data.stepMode;
                document.getElementById('git-check').checked = data.gitAutomation;
                document.getElementById('auto-approve-check').checked = data.autoApprove;
                document.getElementById('max-iter-input').value = data.maxIterations || 5;
            } catch (err) {
                console.error('Failed to fetch settings:', err);
            }
        }

        async function updateSettings() {
            const settings = {
                aiMode: document.getElementById('mode-select').value,
                localModel: document.getElementById('local-model-select').value,
                remoteModel: document.getElementById('remote-model-select').value,
                darwinMode: document.getElementById('darwin-check').checked,
                iterativeMode: document.getElementById('iterative-check').checked,
                selfIterativeMode: document.getElementById('self-iterative-check').checked,
                stepMode: document.getElementById('step-check').checked,
                autoApprove: document.getElementById('auto-approve-check').checked,
                gitAutomation: document.getElementById('git-check').checked,
                maxIterations: parseInt(document.getElementById('max-iter-input').value)
            };

            try {
                await fetch('/server/orchestrator/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings)
                });
            } catch (err) {
                console.error('Failed to update settings:', err);
            }
        }

        function appendMessage(msg) {
            if (msg.sequenceNumber <= lastSequenceNumber) return;
            lastSequenceNumber = msg.sequenceNumber;

            const div = document.createElement('div');
            let className = 'message ' + msg.agentType;
            if (msg.priority === 3) className += ' waiting';
            if (msg.priority === 1) className += ' progress';
            if (msg.agentType === 'error') className += ' error';

            div.className = className;

            const meta = document.createElement('div');
            meta.className = 'message-meta';
            meta.innerHTML = `<span>${msg.sender}</span><span>${msg.timestamp}</span>`;

            const text = document.createElement('div');
            text.innerText = msg.text;

            div.appendChild(meta);
            div.appendChild(text);

            if (msg.priority === 3) {
                const actions = document.createElement('div');
                actions.className = 'approval-buttons';

                if (msg.text.toLowerCase().includes('approve') || msg.text.toLowerCase().includes('proceed')) {
                    actions.innerHTML = `
                        <button class="btn-approve" onclick="provideApproval('${msg.turnId}', true)">Approve</button>
                        <button class="btn-reject" onclick="provideApproval('${msg.turnId}', false)">Reject</button>
                    `;
                }
                div.appendChild(actions);
            }

            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;

            if (msg.isTerminal) {
                thinkingIndicator.style.display = 'none';
            } else if (msg.priority === 1 || msg.priority === 0) {
                thinkingIndicator.style.display = 'flex';
            }
        }

        async function pollConversation() {
            if (isPolling) return;
            isPolling = true;
            try {
                const response = await fetch('/server/conversation/' + currentSessionId);
                const messages = await response.json();
                messages.forEach(appendMessage);
            } catch (err) {
                console.error('Polling error:', err);
            } finally {
                isPolling = false;
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            const branch = document.getElementById('branch-select').value;
            userInput.value = '';

            try {
                const payload = { prompt: text, sessionId: currentSessionId };
                if (branch) payload.branch = branch;

                await fetch('/task', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                thinkingIndicator.style.display = 'flex';
            } catch (err) {
                console.error('Failed to send message:', err);
            }
        }

        async function provideApproval(turnId, approved) {
            try {
                // Try task-based approval first
                let response = await fetch('/task/' + turnId + '/approve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ approved })
                });

                // If not found, try conversation-based approval (using sessionId)
                if (response.status === 404) {
                    await fetch('/conversation/' + currentSessionId + '/approve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ approved })
                    });
                }
            } catch (err) {
                console.error('Failed to provide approval:', err);
            }
        }

        async function pollStatus() {
            try {
                const response = await fetch('/server/status');
                const data = await response.json();

                const ollamaBadge = document.getElementById('ollama-status');
                if (data.ollama && data.ollama.online) {
                    ollamaBadge.innerText = 'OLLAMA ONLINE';
                    ollamaBadge.className = 'status-badge status-online';

                    const localSelect = document.getElementById('local-model-select');
                    if (localSelect.options[0].text === 'Loading...') {
                        localSelect.innerHTML = '';
                        data.ollama.models.forEach(m => {
                            const opt = document.createElement('option');
                            opt.value = m.name;
                            opt.text = m.name;
                            localSelect.appendChild(opt);
                        });
                    }
                } else {
                    ollamaBadge.innerText = 'OLLAMA OFFLINE';
                    ollamaBadge.className = 'status-badge status-offline';
                }
            } catch (err) { }
        }

        async function refreshBranches() {
            try {
                const response = await fetch('/git/branches');
                const branches = await response.json();
                const select = document.getElementById('branch-select');
                select.innerHTML = '<option value="">Auto-create</option>';
                branches.forEach(b => {
                    const opt = document.createElement('option');
                    opt.value = b; opt.text = b; select.appendChild(opt);
                });
            } catch (err) {}
        }

        async function newSession() {
            const name = prompt("Enter session name:", "task");
            if (name) {
                // In a real app we'd trigger session creation on backend
                // For mirror, we just change local ID and let backend sync if it can
                currentSessionId = name;
                chatArea.innerHTML = '';
                lastSequenceNumber = 0;
                document.getElementById('session-display').innerText = 'Session: ' + name;
            }
        }

        function cleanChat() {
            chatArea.innerHTML = '';
            lastSequenceNumber = 0;
        }

        // Initialize
        fetchSettings();
        pollStatus();
        refreshBranches();

        setInterval(pollConversation, 1000);
        setInterval(pollStatus, 10000);
        setInterval(fetchSettings, 30000);
    </script>
</body>
</html>
