<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="evolution.css">
    <script src="evolution.js"></script>
    <meta charset="UTF-8">
    <title>Darwin Evolution Tree</title>
</head>
<body>
    <div id="tree-container">
        <svg id="canvas" width="100%" height="100%"></svg>
    </div>
    <div id="sidebar">
        <h2 id="side-title">Node Details</h2>
        <div class="detail-item">
            <span class="detail-label">Strategy</span>
            <div id="side-strategy" class="detail-value"></div>
        </div>
        <div class="detail-item">
            <span class="detail-label">Philosophy</span>
            <div id="side-philosophy" class="detail-value"></div>
        </div>
        <div class="detail-item">
            <span class="detail-label">Status</span>
            <div id="side-status" class="detail-value"></div>
        </div>
        <div class="detail-item">
            <span class="detail-label">Fitness</span>
            <div id="side-fitness" class="detail-value"></div>
        </div>
        <div class="detail-item">
            <span class="detail-label">Rejection Reason</span>
            <div id="side-rejection" class="detail-value"></div>
        </div>
        <div class="detail-item">
            <span class="detail-label">Files Created/Modified</span>
            <div id="side-files" class="detail-value"></div>
        </div>
        <div class="detail-item">
            <span class="detail-label">LLM Prompt Snippet</span>
            <pre id="side-prompt"></pre>
        </div>
        <div class="detail-item">
            <span class="detail-label">LLM Response Snippet</span>
            <pre id="side-response"></pre>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const sidebar = document.getElementById('sidebar');
        let transform = { x: 50, y: 300, scale: 1 };
        let isDragging = false;
        let startX, startY;
        let treeData = null;

        async function loadTree() {
            try {
                // In a real environment, we'd fetch from /evolution/tree?sessionId=...
                const response = await fetch('/evolution/tree');
                treeData = await response.json();
                renderTree(treeData);
            } catch (err) {
                console.error("Failed to load evolution tree", err);
            }
        }

        function renderTree(data) {
            canvas.innerHTML = '';
            if (!data.nodes || data.nodes.length === 0) return;

            const nodesMap = {};
            data.nodes.forEach(n => nodesMap[n.id] = n);

            // Simple layout: Iteration is X, siblings are Y
            const iters = {};
            data.nodes.forEach(n => {
                if (!iters[n.iteration]) iters[n.iteration] = [];
                iters[n.iteration].push(n);
            });

            const spacingX = 250;
            const spacingY = 120;

            Object.keys(iters).forEach(it => {
                iters[it].forEach((n, i) => {
                    n.x = n.iteration * spacingX;
                    n.y = (i - iters[it].length / 2) * spacingY;
                });
            });

            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("transform", `translate(${transform.x}, ${transform.y}) scale(${transform.scale})`);
            canvas.appendChild(g);

            // Render Links
            data.nodes.forEach(n => {
                if (n.parentId && nodesMap[n.parentId]) {
                    const parent = nodesMap[n.parentId];
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    const d = `M ${parent.x} ${parent.y} C ${(parent.x + n.x) / 2} ${parent.y}, ${(parent.x + n.x) / 2} ${n.y}, ${n.x} ${n.y}`;
                    line.setAttribute("d", d);
                    line.setAttribute("class", "link");
                    g.appendChild(line);
                }
            });

            // Render Nodes
            data.nodes.forEach(n => {
                const nodeG = document.createElementNS("http://www.w3.org/2000/svg", "g");
                nodeG.setAttribute("transform", `translate(${n.x}, ${n.y})`);

                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("r", 20);
                circle.setAttribute("class", `node status-${n.status}`);
                circle.onclick = () => showDetails(n);

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("y", 35);
                text.setAttribute("class", "label");
                text.textContent = n.strategy.substring(0, 20) + (n.strategy.length > 20 ? '...' : '');

                nodeG.appendChild(circle);
                nodeG.appendChild(text);
                g.appendChild(nodeG);
            });
        }

        function showDetails(node) {
            sidebar.style.display = 'block';
            document.querySelectorAll('.node').forEach(n => n.classList.remove('selected'));
            event.target.classList.add('selected');

            document.getElementById('side-strategy').textContent = node.strategy;
            document.getElementById('side-philosophy').textContent = node.philosophy;
            document.getElementById('side-status').textContent = node.status;
            document.getElementById('side-fitness').textContent = node.fitness.toFixed(2);
            document.getElementById('side-rejection').textContent = node.details.rejectionReason || 'N/A';

            const files = [...node.details.createdFiles, ...node.details.modifiedFiles].join('\n');
            document.getElementById('side-files').textContent = files || 'None';

            document.getElementById('side-prompt').textContent = node.details.llmPrompt || 'No snapshot';
            document.getElementById('side-response').textContent = node.details.llmResponse || 'No snapshot';
        }

        // Pan and Zoom
        document.getElementById('tree-container').onmousedown = (e) => {
            isDragging = true;
            startX = e.clientX - transform.x;
            startY = e.clientY - transform.y;
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            transform.x = e.clientX - startX;
            transform.y = e.clientY - startY;
            updateTransform();
        };

        window.onmouseup = () => isDragging = false;

        document.getElementById('tree-container').onwheel = (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            transform.scale *= delta;
            updateTransform();
        };

        function updateTransform() {
            const g = canvas.querySelector('g');
            if (g) g.setAttribute("transform", `translate(${transform.x}, ${transform.y}) scale(${transform.scale})`);
        }

        loadTree();
    </script>
</body>
</html>
