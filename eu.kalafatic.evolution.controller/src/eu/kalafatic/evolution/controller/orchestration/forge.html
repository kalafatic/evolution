<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVO Forge</title>
    <style>
        :root {
            --bg-primary: #1e1e1e;
            --bg-secondary: #252526;
            --border: #3c3c3c;
            --text: #d4d4d4;
            --text-dim: #858585;
            --accent: #007acc;
            --accent-hover: #1177bb;
            --error: #f48771;
            --success: #89d185;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text);
            overflow: hidden;
        }

        #layout { display: flex; height: 100%; }

        /* Session Bar */
        #sidebar {
            width: 260px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .sidebar-header {
            padding: 10px;
            background-color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 0.8em;
            letter-spacing: 1px;
        }

        #session-list { flex-grow: 1; overflow-y: auto; }
        .session-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            position: relative;
        }
        .session-item:hover { background-color: #2a2d2e; }
        .session-item.active {
            background-color: #37373d;
            border-left: 3px solid var(--accent);
        }
        .session-name { display: block; font-weight: bold; margin-bottom: 4px; }
        .session-info { font-size: 0.75em; color: var(--text-dim); }
        .session-status {
            font-size: 0.7em;
            padding: 2px 4px;
            border-radius: 3px;
            background: #444;
            float: right;
        }
        .status-training { color: #dcdcaa; border: 1px solid #dcdcaa; }

        /* Main Content */
        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        #top-toolbar {
            height: 40px;
            background-color: #333;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid var(--border);
        }
        #active-session-name { font-weight: bold; color: var(--accent); margin-right: 20px; }

        /* Canvas */
        #canvas-container {
            flex-grow: 1;
            position: relative;
            background-color: #1a1a1a;
            background-image: radial-gradient(circle, #333 1px, transparent 1px);
            background-size: 30px 30px;
        }
        #canvas { width: 100%; height: 100%; }

        /* Right Panels */
        #panels-container {
            width: 320px;
            background-color: var(--bg-secondary);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .panel { padding: 15px; border-bottom: 1px solid var(--border); }
        .panel h3 {
            font-size: 0.85em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin: 0 0 12px 0;
            display: flex;
            justify-content: space-between;
        }

        .control-group { margin-bottom: 10px; }
        .control-group label { display: block; font-size: 0.8em; margin-bottom: 4px; color: var(--text-dim); }
        .control-group input, .control-group select {
            width: 100%;
            background: #3c3c3c;
            border: 1px solid #555;
            color: white;
            padding: 4px;
            box-sizing: border-box;
        }

        /* Buttons */
        .btn {
            background-color: #3a3d41;
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 2px;
            font-size: 0.85em;
        }
        .btn:hover { background-color: #45494e; }
        .btn-primary { background-color: var(--accent); }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-danger { color: var(--error); }
        .btn-sm { padding: 2px 6px; font-size: 0.75em; }

        /* Graph Elements */
        .node circle { stroke: #555; stroke-width: 2px; }
        .node text { font-size: 11px; fill: var(--text); pointer-events: none; }
        .link { stroke: #444; stroke-width: 2px; fill: none; marker-end: url(#arrowhead); }

        /* Node Types Colors */
        .node-NEURON circle { fill: #ce9178; }
        .node-LAYER circle { fill: #4fc1ff; }
        .node-ATTENTION circle { fill: #c586c0; }
        .node-TRANSFORMER circle { fill: #b5cea8; }
        .node-CUSTOM circle { fill: #858585; }

        /* Logs/Metrics */
        #log-view {
            height: 150px;
            background: #000;
            color: #aaa;
            font-family: monospace;
            font-size: 0.75em;
            padding: 5px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        /* Floating Palette */
        #node-palette {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(37, 37, 38, 0.9);
            border: 1px solid var(--border);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #json-fallback {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-primary);
            color: #d4d4d4;
            font-family: monospace;
            padding: 20px;
            box-sizing: border-box;
            border: none;
            resize: none;
            z-index: 100;
        }

    </style>
</head>
<body>
    <div id="layout">
        <!-- SESSION BAR -->
        <div id="sidebar">
            <div class="sidebar-header">
                SESSIONS
                <button class="btn btn-sm btn-primary" onclick="createNewSession()">NEW</button>
            </div>
            <div id="session-list">
                <!-- Sessions populated here -->
            </div>
            <div class="panel" style="border-top: 1px solid var(--border); border-bottom: none;">
                <h3>Genome Milestones</h3>
                <div id="snapshot-list" class="session-info">No snapshots created</div>
                <button class="btn btn-sm" style="width: 100%; margin-top: 10px;" onclick="createSessionSnapshot()">SNAPSHOT</button>
            </div>
        </div>

        <!-- MAIN CANVAS -->
        <div id="main-content">
            <div id="top-toolbar">
                <span id="active-session-name">No Session Selected</span>
                <div id="session-status-indicator"></div>

                <div style="margin-left: auto; display: flex; gap: 10px;">
                    <button class="btn btn-sm" onclick="toggleJsonEditor()">JSON Editor</button>
                    <button class="btn btn-sm" onclick="cloneActiveSession()">Clone</button>
                    <button class="btn btn-sm" onclick="saveActiveModel()">Save Architecture</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteActiveSession()">Delete</button>
                </div>
            </div>

            <div id="canvas-container">
                <svg id="canvas">
                    <defs>
                        <marker id="arrowhead" viewBox="-0 -5 10 10" refX="20" refY="0" orient="auto" markerWidth="6" markerHeight="6" xoverflow="visible">
                            <path d="M 0,-5 L 10 ,0 L 0,5" fill="#555" style="stroke: none;"></path>
                        </marker>
                    </defs>
                </svg>

                <div id="node-palette">
                    <div style="font-size: 0.7em; color: var(--text-dim); margin-bottom: 5px;">DRAG NODES</div>
                    <button class="btn btn-sm" draggable="true" ondragstart="onNodeDrag(event, 'NEURON')">Neuron</button>
                    <button class="btn btn-sm" draggable="true" ondragstart="onNodeDrag(event, 'LAYER')">Layer</button>
                    <button class="btn btn-sm" draggable="true" ondragstart="onNodeDrag(event, 'ATTENTION')">Attention</button>
                    <button class="btn btn-sm" draggable="true" ondragstart="onNodeDrag(event, 'TRANSFORMER')">Transformer</button>
                    <button class="btn btn-sm" draggable="true" ondragstart="onNodeDrag(event, 'CUSTOM')">Custom</button>
                </div>

                <textarea id="json-fallback"></textarea>
            </div>
        </div>

        <!-- RIGHT PANELS -->
        <div id="panels-container">
            <!-- CONFIGURATION PANEL -->
            <div class="panel">
                <h3>Configuration</h3>
                <div class="control-group">
                    <label>Model Type</label>
                    <select id="model-type" onchange="updateActiveSessionInfo()">
                        <option value="NEURON">Single Neuron</option>
                        <option value="MLP">Multi-Layer Perceptron</option>
                        <option value="CNN">Convolutional Neural Network</option>
                        <option value="TRANSFORMER">Transformer Architecture</option>
                        <option value="EXPERIMENTAL">Evolutionary Variant</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Learning Rate</label>
                    <input type="number" id="lr" step="0.0001" value="0.001">
                </div>
                <div class="control-group">
                    <label>Batch Size</label>
                    <input type="number" id="batch" value="32">
                </div>
                <div class="control-group">
                    <label>Optimizer</label>
                    <select id="optimizer">
                        <option value="adam">Adam</option>
                        <option value="sgd">SGD</option>
                        <option value="rmsprop">RMSprop</option>
                    </select>
                </div>
            </div>

            <!-- DATASET PANEL -->
            <div class="panel">
                <h3>Dataset</h3>
                <div class="control-group">
                    <label>Active Dataset</label>
                    <select id="dataset-selector">
                        <option value="mnist">MNIST (Digits)</option>
                        <option value="cifar10">CIFAR-10</option>
                        <option value="wiki">Wikipedia-Small</option>
                        <option value="synthetic">Synthetic Generator</option>
                    </select>
                </div>
                <button class="btn btn-sm" style="width: 100%;">Upload Custom Data</button>
            </div>

            <!-- TRAINING PANEL -->
            <div class="panel">
                <h3>Training & Execution</h3>
                <div style="display: flex; gap: 5px;">
                    <button id="train-btn" class="btn btn-primary" style="flex: 1;" onclick="startTraining()">START</button>
                    <button id="stop-btn" class="btn" style="flex: 1;" onclick="stopTraining()" disabled>STOP</button>
                </div>
                <button class="btn btn-sm" style="width: 100%; margin-top: 8px;">Evaluate Now</button>
            </div>

            <!-- OBSERVABILITY PANEL -->
            <div class="panel" style="flex-grow: 1; border-bottom: none;">
                <h3>Observability</h3>
                <div style="font-size: 0.8em; margin-bottom: 10px;">
                    <div style="display: flex; justify-content: space-between;">
                        <span>Loss:</span> <span id="metric-loss" style="color: var(--accent);">--</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span>Accuracy:</span> <span id="metric-acc" style="color: var(--success);">--</span>
                    </div>
                </div>
                <div id="log-view">
                    <div>[SYS] Forge UI ready.</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        let serverPort = 48080;
        let activeSessionId = null;
        let sessions = [];
        let model = { nodes: [], links: [] };
        let simulation = null;
        let isTraining = false;

        // Bridge to SWT
        function log(msg) {
            if (window.logFunction) logFunction(msg);
            else console.log(msg);

            const logView = document.getElementById('log-view');
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logView.appendChild(entry);
            logView.scrollTop = logView.scrollHeight;
        }

        window.initializeForge = function(port) {
            serverPort = port;
            log(`Connecting to Forge Server on port ${port}...`);
            loadSessions();
        };

        async function loadSessions() {
            try {
                const res = await fetch(`http://localhost:${serverPort}/forge/sessions`);
                sessions = await res.json();
                renderSessionList();
                if (sessions.length > 0 && !activeSessionId) {
                    selectSession(sessions[0].id);
                }
            } catch (e) {
                log(`Error loading sessions: ${e.message}`);
            }
        }

        function renderSessionList() {
            const list = d3.select("#session-list");
            list.selectAll(".session-item").remove();

            const items = list.selectAll(".session-item")
                .data(sessions)
                .enter()
                .append("div")
                .attr("class", d => `session-item ${d.id === activeSessionId ? 'active' : ''}`)
                .on("click", (e, d) => selectSession(d.id));

            items.append("span").attr("class", "session-name").text(d => d.name);
            const info = items.append("div").attr("class", "session-info");
            info.append("span").text(d => d.modelType);
            info.append("span").attr("class", d => `session-status ${d.status === 'TRAINING' ? 'status-training' : ''}`)
                .text(d => d.status);
        }

        async function selectSession(id) {
            activeSessionId = id;
            const session = sessions.find(s => s.id === id);

            document.getElementById('active-session-name').textContent = session ? session.name : "Unknown";
            document.getElementById('model-type').value = session ? session.modelType : "NEURON";

            renderSessionList();
            await fetchModel(id);
            log(`Switched to session: ${session ? session.name : id}`);

            if (window.forgeAction) forgeAction("SESSION_SWITCHED", id);
        }

        async function fetchModel(id) {
            try {
                const res = await fetch(`http://localhost:${serverPort}/forge/session/${id}/model`);
                model = await res.json();
                if (!model.nodes) model = { nodes: [], links: [] };

                document.getElementById('json-fallback').value = JSON.stringify(model, null, 2);
                initGraph();
            } catch (e) {
                log(`Error fetching model: ${e.message}`);
            }
        }

        function initGraph() {
            const svg = d3.select("#canvas");
            const container = document.getElementById('canvas-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            svg.selectAll(".node, .link").remove();

            if (simulation) simulation.stop();

            simulation = d3.forceSimulation(model.nodes)
                .force("link", d3.forceLink(model.links).id(d => d.id).distance(100))
                .force("charge", d3.forceManyBody().strength(-400))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .on("tick", ticked);

            const g = svg.append("g").attr("class", "graph-root");

            const link = g.append("g")
                .selectAll("line")
                .data(model.links)
                .enter().append("line")
                .attr("class", "link");

            const node = g.append("g")
                .selectAll("g")
                .data(model.nodes)
                .enter().append("g")
                .attr("class", d => `node node-${d.type || 'CUSTOM'}`)
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended))
                .on("click", (e, d) => inspectNode(d));

            node.append("circle").attr("r", 20);
            node.append("text")
                .attr("dy", 35)
                .attr("text-anchor", "middle")
                .text(d => d.name);

            function ticked() {
                link.attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                node.attr("transform", d => `translate(${d.x},${d.y})`);
            }
        }

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
        }
        function dragged(event, d) {
            d.fx = event.x; d.fy = event.y;
        }
        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null; d.fy = null;
        }

        // Palette and Canvas actions
        function onNodeDrag(event, type) {
            event.dataTransfer.setData("nodeType", type);
        }

        const canvasEl = document.getElementById('canvas');
        canvasEl.addEventListener('dragover', e => e.preventDefault());
        canvasEl.addEventListener('drop', e => {
            e.preventDefault();
            const type = e.dataTransfer.getData("nodeType");
            if (!type) return;

            const rect = canvasEl.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const newNode = {
                id: "node_" + Date.now(),
                name: type.toLowerCase() + "_" + (model.nodes.length + 1),
                type: type,
                x: x, y: y
            };

            model.nodes.push(newNode);
            initGraph();
            log(`Added ${type} node.`);
        });

        async function createNewSession() {
            const name = prompt("Enter Session Name:");
            if (!name) return;
            try {
                const res = await fetch(`http://localhost:${serverPort}/forge/session`, {
                    method: 'POST',
                    body: JSON.stringify({ name: name, modelType: 'MLP' })
                });
                const data = await res.json();
                await loadSessions();
                selectSession(data.id);
            } catch (e) { log(`Error: ${e.message}`); }
        }

        async function saveActiveModel() {
            if (!activeSessionId) return;
            try {
                await fetch(`http://localhost:${serverPort}/forge/session/${activeSessionId}/model`, {
                    method: 'POST',
                    body: JSON.stringify(model)
                });
                log("Architecture saved to server.");
                if (window.forgeAction) forgeAction("UPDATE_MODEL", JSON.stringify({ sessionId: activeSessionId, modelGraph: JSON.stringify(model) }));
            } catch (e) { log(`Save error: ${e.message}`); }
        }

        function toggleJsonEditor() {
            const editor = document.getElementById('json-fallback');
            if (editor.style.display === 'block') {
                try {
                    model = JSON.parse(editor.value);
                    initGraph();
                    editor.style.display = 'none';
                } catch (e) { alert("Invalid JSON!"); }
            } else {
                editor.value = JSON.stringify(model, null, 2);
                editor.style.display = 'block';
            }
        }

        function startTraining() {
            isTraining = true;
            document.getElementById('train-btn').disabled = true;
            document.getElementById('stop-btn').disabled = false;
            log("Training started...");

            if (window.forgeAction) forgeAction("UPDATE_STATUS", JSON.stringify({ sessionId: activeSessionId, status: "TRAINING" }));

            // Mock metrics
            let epoch = 0;
            const interval = setInterval(() => {
                if (!isTraining) {
                    clearInterval(interval);
                    return;
                }
                epoch++;
                const loss = (1.0 / (1 + epoch * 0.1)).toFixed(4);
                const acc = (0.5 + (0.45 * (1 - 1/(1+epoch)))).toFixed(4);
                document.getElementById('metric-loss').textContent = loss;
                document.getElementById('metric-acc').textContent = acc;
                if (epoch % 5 === 0) log(`Epoch ${epoch}: loss=${loss}, acc=${acc}`);
            }, 1000);
        }

        function stopTraining() {
            isTraining = false;
            document.getElementById('train-btn').disabled = false;
            document.getElementById('stop-btn').disabled = true;
            log("Training stopped.");
            if (window.forgeAction) forgeAction("UPDATE_STATUS", JSON.stringify({ sessionId: activeSessionId, status: "IDLE" }));
        }

        function createSessionSnapshot() {
            if (!activeSessionId) return;
            if (window.forgeAction) forgeAction("CREATE_SNAPSHOT", JSON.stringify({ sessionId: activeSessionId }));
            log("Snapshot request sent.");
        }

        async function deleteActiveSession() {
            if (!activeSessionId) return;
            if (!confirm("Delete this session?")) return;
            try {
                await fetch(`http://localhost:${serverPort}/forge/session/${activeSessionId}`, { method: 'DELETE' });
                log("Session deleted.");
                activeSessionId = null;
                await loadSessions();
            } catch (e) { log(`Error: ${e.message}`); }
        }

        function inspectNode(d) {
            log(`Inspecting ${d.name} (${d.type})`);
            // Fill right panel with node-specific props if needed
        }

        // Notify SWT ready
        if (window.logFunction) logFunction("ready");
    </script>
</body>
</html>
