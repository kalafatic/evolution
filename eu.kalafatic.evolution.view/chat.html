<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg-canvas: #f1f5f9;
            --user-bg: #eff6ff;
            --user-border: #bfdbfe;
            --user-text: #1e40af;
            --ai-bg: #ffffff;
            --ai-text: #1e293b;
            --border: #e2e8f0;

            --planner-bg: #ecfeff;
            --planner-border: #a5f3fc;
            --planner-text: #155e75;

            --architect-bg: #f0fdf4;
            --architect-border: #bbf7d0;
            --architect-text: #166534;

            --javadev-bg: #f5f3ff;
            --javadev-border: #ddd6fe;
            --javadev-text: #5b21b6;

            --tester-bg: #fffbeb;
            --tester-border: #fef3c7;
            --tester-text: #92400e;

            --reviewer-bg: #fff1f2;
            --reviewer-border: #fecdd3;
            --reviewer-text: #9f1239;

            --analytic-bg: #fef2f2;
            --analytic-border: #fee2e2;
            --analytic-text: #991b1b;

            --general-bg: #fdf4ff;
            --general-border: #fae8ff;
            --general-text: #86198f;

            --terminal-bg: #f1f5f9;
            --terminal-border: #e2e8f0;
            --terminal-text: #334155;

            --file-bg: #ecfdf5;
            --file-border: #d1fae5;
            --file-text: #065f46;

            --maven-bg: #fff7ed;
            --maven-border: #ffedd5;
            --maven-text: #9a3412;

            --git-bg: #eff6ff;
            --git-border: #dbeafe;
            --git-text: #1e40af;

            --structure-bg: #f0f9ff;
            --structure-border: #e0f2fe;
            --structure-text: #075985;

            --websearch-bg: #f5f3ff;
            --websearch-border: #ede9fe;
            --websearch-text: #5b21b6;

            --quality-bg: #fdf2f8;
            --quality-border: #fce7f3;
            --quality-text: #9d174d;

            --observability-bg: #fff7ed;
            --observability-border: #ffedd5;
            --observability-text: #9a3412;

            --orchestrator-bg: #f8fafc;
            --orchestrator-border: #cbd5e1;
            --orchestrator-text: #1e293b;

            --final-response-bg: #dcfce7; /* Light Green */
            --final-response-border: #15803d;
            --final-response-text: #14532d;

            --result-summary-bg: #eff6ff;
            --result-summary-border: #3b82f6;
            --result-summary-text: #1e40af;

            --tool-bg: #f8fafc;
            --tool-border: #e2e8f0;
            --tool-text: #475569;

            --waiting-bg: #ffedd5; /* Light Orange */
            --waiting-border: #f97316;
            --waiting-text: #9a3412;

            --error-bg: #fee2e2; /* Light Red */
            --error-border: #dc2626;
            --error-text: #991b1b;
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-canvas);
            margin: 0; padding: 12px;
            color: var(--ai-text);
            line-height: 1.5;
            overflow-y: auto;
        }

        .chat-container { 
            display: flex; flex-direction: column; 
            gap: 12px; max-width: 900px; margin: 0 auto;
        }

        /* Message Structure */
        .message { 
            display: flex; flex-direction: column; 
            max-width: 95%; position: relative;
            animation: slideIn 0.3s ease-out;
        }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.ai { align-self: flex-start; }

        .message-content {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .user .message-content { flex-direction: row-reverse; }

        .header { 
            display: flex; align-items: center; gap: 6px;
            margin-bottom: 2px;
        }
        .user .header { flex-direction: row-reverse; }

        .sender {
            font-size: 11px; font-weight: 700; color: #64748b;
            text-transform: uppercase; letter-spacing: 0.05em;
            user-select: none;
        }
        .user .sender { color: #2563eb; }

        .timestamp { font-size: 10px; color: #94a3b8; user-select: none; }
        .icon { font-size: 14px; user-select: none; }

        /* Bubbles */
        .bubble { 
            padding: 8px 12px; border-radius: 12px;
            font-size: 13px; position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.2s; background: var(--ai-bg); border: 1px solid var(--border);
            cursor: pointer;
            color: var(--ai-text);
        }

        /* Role Specific Styles */
        .message.user .bubble { background: var(--user-bg); border-color: var(--user-border); color: var(--user-text); border-bottom-right-radius: 4px; }
        .message.planner .bubble { background: var(--planner-bg); border-color: var(--planner-border); color: var(--planner-text); border-bottom-left-radius: 4px; }
        .message.architect .bubble { background: var(--architect-bg); border-color: var(--architect-border); color: var(--architect-text); border-bottom-left-radius: 4px; }
        .message.javadev .bubble { background: var(--javadev-bg); border-color: var(--javadev-border); color: var(--javadev-text); border-bottom-left-radius: 4px; }
        .message.tester .bubble { background: var(--tester-bg); border-color: var(--tester-border); color: var(--tester-text); border-bottom-left-radius: 4px; }
        .message.reviewer .bubble { background: var(--reviewer-bg); border-color: var(--reviewer-border); color: var(--reviewer-text); border-bottom-left-radius: 4px; }
        .message.analytic .bubble { background: var(--analytic-bg); border-color: var(--analytic-border); color: var(--analytic-text); border-bottom-left-radius: 4px; }
        .message.general .bubble { background: var(--general-bg); border-color: var(--general-border); color: var(--general-text); border-bottom-left-radius: 4px; }
        .message.terminal .bubble { background: var(--terminal-bg); border-color: var(--terminal-border); color: var(--terminal-text); border-bottom-left-radius: 4px; }
        .message.file .bubble { background: var(--file-bg); border-color: var(--file-border); color: var(--file-text); border-bottom-left-radius: 4px; }
        .message.maven .bubble { background: var(--maven-bg); border-color: var(--maven-border); color: var(--maven-text); border-bottom-left-radius: 4px; }
        .message.git .bubble { background: var(--git-bg); border-color: var(--git-border); color: var(--git-text); border-bottom-left-radius: 4px; }
        .message.structure .bubble { background: var(--structure-bg); border-color: var(--structure-border); color: var(--structure-text); border-bottom-left-radius: 4px; }
        .message.websearch .bubble { background: var(--websearch-bg); border-color: var(--websearch-border); color: var(--websearch-text); border-bottom-left-radius: 4px; }
        .message.quality .bubble { background: var(--quality-bg); border-color: var(--quality-border); color: var(--quality-text); border-bottom-left-radius: 4px; }
        .message.observability .bubble { background: var(--observability-bg); border-color: var(--observability-border); color: var(--observability-text); border-bottom-left-radius: 4px; }
        .message.orchestrator .bubble { background: var(--orchestrator-bg); border-color: var(--orchestrator-border); color: var(--orchestrator-text); border-bottom-left-radius: 4px; }
        .message.final-response .bubble {
            background: var(--final-response-bg);
            border-color: var(--final-response-border);
            color: var(--final-response-text);
            border-bottom-left-radius: 4px;
            border-width: 3px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .message.result-summary .bubble { background: var(--result-summary-bg); border-color: var(--result-summary-border); color: var(--result-summary-text); border-bottom-left-radius: 4px; border-width: 1px; }
        .message.tool .bubble { background: var(--tool-bg); border-color: var(--tool-border); color: var(--tool-text); border-bottom-left-radius: 4px; }
        .message.waiting .bubble {
            background: var(--waiting-bg);
            border-color: var(--waiting-border);
            color: var(--waiting-text);
            border-bottom-left-radius: 4px;
            border-style: solid;
            border-width: 3px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .message.error .bubble {
            background: var(--error-bg);
            border-color: var(--error-border);
            color: var(--error-text);
            border-bottom-left-radius: 4px;
            border-width: 2px;
        }

        .message.ai .bubble { 
            border-bottom-left-radius: 4px;
        }
        .bubble:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .bubble a {
            color: inherit;
            text-decoration: underline;
            font-weight: bold;
            cursor: pointer;
        }

        .link-go { color: #16a34a !important; text-decoration: underline !important; }
        .link-clarify { color: #d97706 !important; text-decoration: underline !important; }
        .link-problem { color: #dc2626 !important; text-decoration: underline !important; font-weight: bold; }

        /* Hover Actions */
        .actions { 
            display: flex; flex-direction: row; gap: 4px;
            opacity: 0; transition: opacity 0.2s;
            user-select: none;
        }
        .message:hover .actions { opacity: 1; }
        .message.waiting .actions { opacity: 1; }

        .action-btn {
            background: white; border: 1px solid var(--border); border-radius: 4px;
            width: 24px; height: 24px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; color: #64748b; transition: all 0.2s;
            font-size: 12px;
            user-select: none;
        }
        .action-btn:hover { background: #f1f5f9; color: #2563eb; border-color: #cbd5e1; }
        .action-btn.approve { color: #16a34a; }
        .action-btn.approve:hover { background: #f0fdf4; border-color: #bbf7d0; }

        /* Collapsed State */
        .collapsed .bubble-content { display: none; }
        .collapsed .bubble { padding: 8px 16px; min-height: 0; opacity: 0.7; }
        .collapsed .bubble::after { content: '... (message collapsed)'; font-style: italic; font-size: 12px; color: #94a3b8; }

        /* Formatting */
        pre {
            background: #0f172a; color: #f8fafc; padding: 10px;
            border-radius: 8px; overflow-x: auto;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 12px; margin: 8px 0; border: 1px solid #1e293b;
            position: relative;
        }
        code {
            font-family: 'Fira Code', monospace; background: rgba(0,0,0,0.05);
            padding: 2px 4px; border-radius: 4px; font-weight: 500; color: inherit;
        }
        h3 { margin: 16px 0 8px 0; font-size: 16px; font-weight: 700; color: inherit; }
        ul { margin: 8px 0; padding-left: 20px; }
        li { margin: 4px 0; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Thinking Animation */
        .thinking {
            display: flex; gap: 4px; padding: 6px 10px;
            background: white; border: 1px solid var(--border);
            border-radius: 12px; align-self: flex-start;
            margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .dot { width: 8px; height: 8px; background: #3b82f6; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body>
    <div class='chat-container' id='chat'></div>
    <div id='thinking' style='display:none'>
        <div class='thinking'>
            <div class='dot'></div>
            <div class='dot'></div>
            <div class='dot'></div>
        </div>
    </div>

    <script>
        const icons = {
            user: '👤', ai: '🤖', planner: '📋', architect: '📐',
            javadev: '💻', tester: '🧪', reviewer: '⚖️', tool: '⚙️',
            analytic: '🔍', general: '🧠', terminal: '📟', file: '📂',
            maven: '📦', git: '🌿', structure: '🌳', websearch: '🌐',
            quality: '✨', observability: '📊', orchestrator: '🎼',
            'final-response': '✅', 'result-summary': 'ℹ️', waiting: '❓', error: '❌'
        };

        function formatText(text) {
            if (!text) return "";

            // 1. Escape HTML first to prevent XSS
            let escaped = escapeHtml(text);

            // 2. Code blocks
            escaped = escaped.replace(/```([\s\S]*?)```/g, function(match, code) {
                const trimmedCode = code.trim();
                // code inside ``` is already escaped by escapeHtml, but we need it raw for Copy
                // Wait, if I escaped everything, I need to unescape for the copy function?
                // Better: extract code blocks BEFORE escaping everything else, OR unescape specifically for copy.
                return 'CODE_BLOCK_PLACEHOLDER';
            });

            // Re-thinking: Better to extract blocks, escape the rest, then put blocks back.
            const blocks = [];
            text = text.replace(/```([\s\S]*?)```/g, function(match, code) {
                blocks.push(code.trim());
                return '___CODE_BLOCK_' + (blocks.length - 1) + '___';
            });

            text = escapeHtml(text);

            // Create/Clarify links
            text = text.replace(/\bCREATE\b/g, '<a class="link-go" onclick="event.stopPropagation(); JavaHandler(\'create\', \'-1\', \'\')">CREATE</a>');
            text = text.replace(/\bCLARIFY\b/g, '<a class="link-clarify" onclick="event.stopPropagation(); JavaHandler(\'clarify\', \'-1\', \'\')">CLARIFY</a>');

            // Specific phrase links
            text = text.replace(/could you tell me a bit more about what you(?:’|'|&#039;)re trying to accomplish\?/g, '<a class="link-clarify" onclick="event.stopPropagation(); JavaHandler(\'clarify\', \'-1\', \'\')">$&</a>');
            text = text.replace(/Are you looking for a simple example to get started/g, '<a class="link-go" onclick="event.stopPropagation(); JavaHandler(\'helloworld\', \'-1\', \'\')">$&</a>');
            text = text.replace(/are you working on a more complex project that requires a specific file structure\?/g, '<a class="link-clarify" onclick="event.stopPropagation(); JavaHandler(\'clarify\', \'-1\', \'\')">$&</a>');

            // Problem patterns
            const problemPatterns = [/server not running/gi, /model not active/gi, /connection lost/gi, /connection refused/gi, /error during execution/gi, /exception:/gi, /failed/gi];
            problemPatterns.forEach(pattern => {
                text = text.replace(pattern, '<a class="link-problem">$&</a>');
            });

            // General proposal link [PROPOSAL: Label | Request]
            text = text.replace(/\[PROPOSAL:\s*(.*?)\s*\|\s*(.*?)\s*\]/g, '<a class="link-go" onclick="event.stopPropagation(); JavaHandler(\'executeProposal\', \'-1\', \'$2\')"><b>$1</b></a>');

            // File link [FILE: path]
            text = text.replace(/\[FILE:\s*(.*?)\s*\]/g, '<a onclick="event.stopPropagation(); JavaHandler(\'openDiff\', \'-1\', \'$1\')"><b>$1</b></a>');

            text = text.replace(/___CODE_BLOCK_(\d+)___/g, function(match, index) {
                const code = blocks[parseInt(index)];
                return '<pre><code>' + escapeHtml(code) + '</code><button class="copy-btn" style="position:absolute;top:8px;right:8px;background:rgba(255,255,255,0.1);border:none;color:white;padding:4px 8px;border-radius:4px;font-size:10px;cursor:pointer;user-select:none;" onclick="event.stopPropagation(); JavaHandler(\'copy\', \'-1\', \'' + escapeJs(code) + '\')">Copy</button></pre>';
            });

            // Headers
            text = text.replace(/^### (.*$)/gim, '<h3>$1</h3>');

            // Lists - less greedy and better wrapping
            text = text.replace(/^(?:\*|-) (.*$)/gim, '<li>$1</li>');
            text = text.replace(/(?:<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

            // Inline code
            text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Bold & Italic
            text = text.replace(/\*\*([^\*]+)\*\*/g, '<b>$1</b>');
            text = text.replace(/\*([^\*]+)\*/g, '<i>$1</i>');

            // Newlines
            return text.replace(/\n/g, '<br>');
        }

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function escapeJs(text) {
            if (!text) return "";
            return text.replace(/\\/g, '\\\\')
                       .replace(/'/g, "\\'")
                       .replace(/"/g, "&quot;")
                       .replace(/`/g, "\\`")
                       .replace(/\n/g, '\\n')
                       .replace(/\r/g, '');
        }

        function selectAll() {
            let text = '';
            document.querySelectorAll('.message').forEach(m => {
                const sender = m.querySelector('.sender').innerText;
                const timestamp = m.querySelector('.timestamp').innerText;
                const bubble = m.querySelector('.bubble-content');

                // Clone the bubble to remove non-text elements like copy buttons
                const clone = bubble.cloneNode(true);
                clone.querySelectorAll('.copy-btn').forEach(btn => btn.remove());

                text += sender + ' [' + timestamp + ']: ' + clone.innerText + '\n\n';
            });
            JavaHandler('copy', '-1', text.trim());
        }

        function toggleAll() {
            const messages = document.querySelectorAll('.message');
            let anyOpen = Array.from(messages).some(m => !m.classList.contains('collapsed'));
            messages.forEach(m => {
                if (anyOpen) m.classList.add('collapsed');
                else m.classList.remove('collapsed');
            });
        }

        function toggleCollapse(index) {
            const msg = document.getElementById('msg-' + index);
            if (msg) msg.classList.toggle('collapsed');
        }

        function updateMessages(messages) {
            const container = document.getElementById('chat');
            const wasAtBottom = (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 50;

            container.innerHTML = '';
            messages.forEach(m => {
                const div = document.createElement('div');
                const role = (m.agentType || '').toLowerCase();
                const isUser = role === 'user' || m.sender.toLowerCase().includes('you') || m.sender.toLowerCase().includes('user');
                div.className = 'message ' + (isUser ? 'user' : 'ai') + ' ' + role;
                div.id = 'msg-' + m.index;

                const header = document.createElement('div');
                header.className = 'header';

                const icon = document.createElement('span');
                icon.className = 'icon';
                icon.textContent = icons[m.agentType] || (isUser ? icons.user : icons.ai);

                const sender = document.createElement('span');
                sender.className = 'sender';
                sender.textContent = m.sender;

                const time = document.createElement('span');
                time.className = 'timestamp';
                time.textContent = m.timestamp || '';

                header.appendChild(icon);
                header.appendChild(sender);
                header.appendChild(time);

                const msgContent = document.createElement('div');
                msgContent.className = 'message-content';

                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.onclick = () => JavaHandler('edit', m.index.toString(), m.text);

                const content = document.createElement('div');
                content.className = 'bubble-content';
                content.innerHTML = formatText(m.text);
                bubble.appendChild(content);

                const actions = document.createElement('div');
                actions.className = 'actions';
                actions.innerHTML = `
                    <button class="action-btn approve" title="Approve" onclick="event.stopPropagation(); JavaHandler('approve', '${m.index}', '')">✅</button>
                    <button class="action-btn" title="Copy Message" onclick="event.stopPropagation(); JavaHandler('copy', '${m.index}', '${escapeJs(m.text)}')">📋</button>
                    <button class="action-btn" title="Collapse/Expand" onclick="event.stopPropagation(); toggleCollapse(${m.index})">↕️</button>
                `;

                msgContent.appendChild(bubble);
                msgContent.appendChild(actions);

                div.appendChild(header);
                div.appendChild(msgContent);
                container.appendChild(div);
            });

            if (wasAtBottom || messages.length === 1) {
                window.scrollTo(0, document.body.scrollHeight);
            }
        }

        function showThinking(show) {
            document.getElementById('thinking').style.display = show ? 'block' : 'none';
            if (show) window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
