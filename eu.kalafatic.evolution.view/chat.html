<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
	<style>
	        /* 1. Remove default margins and padding */
	        /* 2. Set height to 100% of the viewport */
	        html, body {
	            margin: 0;
	            padding: 0;
	            height: 100%;
	            width: 100%;
	            overflow: hidden; /* Prevents scrollbars if content fits */
	        }

	        /* 3. Create a container that fills the browser panel */
	        .viewport-container {
	            display: flex;
	            flex-direction: column;
	            justify-content: center;
	            align-items: center;
	            height: 100%;
	            width: 100%;
	            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
	            color: white;
	            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
	        }

	        .card {
	            background: rgba(255, 255, 255, 0.1);
	            padding: 2rem;
	            border-radius: 12px;
	            backdrop-filter: blur(10px);
	            border: 1px solid rgba(255, 255, 255, 0.2);
	            text-align: center;
	        }
	    </style>
		
    <title>AI Evolution Chat</title>

    <!-- CSS Modules -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/messages.css">
    <link rel="stylesheet" href="css/branches.css">
    <link rel="stylesheet" href="css/panel.css">
    <link rel="stylesheet" href="css/progress.css">
    <link rel="stylesheet" href="css/animations.css">

    <script>
        // Diagnostic JavaLog Bridge
        window.onerror = function(msg, url, line, col, error) {
            if (window.JavaLog) window.JavaLog('[JS Error] ' + msg + ' at ' + line + ':' + col);
            return false;
        };

        // Resilience: fallback for loading overlay
        window.hideLoading = function() {
            var overlay = document.getElementById('loading-overlay');
            if (overlay) overlay.style.display = 'none';
        };
        setTimeout(window.hideLoading, 5000);
    </script>
</head>
<body class="full">
    <div id="loading-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; font-family: sans-serif; color: #64748b;">
        <div style="text-align: center;">
            <div class="thinking" style="margin: 0 auto 12px auto; display: flex;">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div>Initializing AI Intelligence...</div>
        </div>
    </div>

    <div id="floating-quote-btn" onclick="quoteSelection()">Quote</div>

    <div id="chat-layout" style="display: flex; height: 100vh; width: 100vw; overflow: hidden;">
        <div id="main-content" style="flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden;">
            <div class="chat-search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="chat-search-input" class="search-input" placeholder="Search chat history (use /regex/ for regex)..." oninput="window.filterMessages(this.value)">
                <span id="search-match-count" class="search-counter"></span>
                <button id="chat-search-clear" class="panel-btn" onclick="document.getElementById('chat-search-input').value=''; window.filterMessages('')" style="border:none; background:none;">✕</button>
            </div>
            <div class='chat-container' id='chat' style="flex: 1; overflow-y: auto; padding: 8px;">
                <div id="messages-wrapper" style="display: flex; flex-direction: column; gap: 4px;"></div>
                <div id='thinking' style='display:none; align-items: center; gap: 12px; margin-top: 12px; padding-left: 10px;'>
                    <div class='thinking' style="margin-bottom: 0;">
                        <div class='dot'></div>
                        <div class='dot'></div>
                        <div class='dot'></div>
                    </div>
                    <span style="font-size: 12px; color: #64748b; font-weight: 500;">Evo is thinking...</span>
                </div>
            </div>
            <div id="nav-controls">
                <button class="nav-btn" onclick="if(window.hasSearchMatches()) window.navigateSearch(-1); else scrollToTop();" title="Previous Match / Scroll to Top">↑</button>
                <button class="nav-btn" onclick="if(window.hasSearchMatches()) window.navigateSearch(1); else scrollToBottom();" title="Next Match / Scroll to Bottom">↓</button>
            </div>
        </div>

        <div id="progress-panel" class="side-panel" style="width: 320px;">
            <div id="progress-resize-handle" class="resize-handle"></div>
            <div class="side-panel-header">
                <div class="side-panel-title-row">
                    <span style="font-weight: bold; font-size: 12px; color: #64748b;">COGNITIVE STATE</span>
                    <button class="panel-btn" onclick="document.getElementById('progress-panel').style.width='0px'" title="Close Panel">✕</button>
                </div>
            </div>
            <div id="cognitive-state-content" style="padding: 10px; border-bottom: 1px solid var(--border); background: #f1f5f9;">
                <!-- Cognitive state will be rendered here -->
                <div style="text-align: center; color: #94a3b8; padding: 10px; font-size: 11px;">
                    Initializing Engine...
                </div>
            </div>
            <div class="side-panel-header" style="border-top: none;">
                <div class="side-panel-title-row">
                    <span style="font-weight: bold; font-size: 12px; color: #64748b;">EVOLUTION PROGRESS</span>
                </div>
            </div>
            <div id="progress-content" style="flex: 1; overflow-y: auto; padding: 10px;">
                <!-- Progress monitor will be rendered here -->
                <div style="text-align: center; color: #94a3b8; margin-top: 20px; font-size: 11px;">
                    Evolution tracking inactive.
                </div>
            </div>
        </div>

        <div id="side-panel" class="side-panel">
            <div id="resize-handle" class="resize-handle"></div>
            <div class="side-panel-header">
                <div class="side-panel-title-row">
                    <span id="side-panel-title" style="font-weight: bold; font-size: 12px; color: #64748b;">CHANGES</span>
                    <div class="side-panel-actions">
                        <button class="panel-btn" onclick="toggleAllFiles()" title="Toggle All">↕️</button>
                        <button class="panel-btn" onclick="window.ChatApp.Actions.callJava('refreshGit')" title="Refresh">🔄</button>
                        <button class="panel-btn" onclick="downloadZip()" title="Download ZIP">📦</button>
                        <button class="panel-btn" onclick="window.ChatApp.Actions.callJava('executeProposal', '-1', 'openPeerReview')" title="Open Peer Review">⚖️</button>
                        <button class="panel-btn" onclick="toggleSidePanel()" title="Close Panel">✕</button>
                    </div>
                </div>
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="Search files..." oninput="filterFiles(this.value)">
                </div>
            </div>
            <div id="changes-list" style="flex: 1; overflow-y: auto; padding: 10px;">
                <!-- Changed files will be listed here -->
            </div>
            <div id="side-panel-footer" style="padding: 10px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px;">
                <button onclick="commitChanges()" style="width: 100%; padding: 8px; background: #16a34a; color: white; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer;">Commit Changes</button>
            </div>
        </div>

        <div id="context-menu">
            <div class="menu-item" onclick="menuAction('workspace')"><span class="menu-icon">🏢</span> Open in Workspace</div>
            <div class="menu-item" onclick="menuAction('review')"><span class="menu-icon">📝</span> Open in Review Editor</div>
            <div class="menu-separator"></div>
            <div class="menu-item" style="color: #dc2626;" onclick="menuAction('revert')"><span class="menu-icon">⏪</span> Revert Change</div>
            <div class="menu-separator"></div>
            <div class="menu-item" onclick="menuAction('copyPath')"><span class="menu-icon">📋</span> Copy Path</div>
        </div>
    </div>

    <!-- JS Modules (Non-ESM) -->
    <script src="js/constants.js" charset="UTF-8"></script>
    <script src="js/utils.js" charset="UTF-8"></script>
    <script src="js/actions.js" charset="UTF-8"></script>
    <script src="js/renderer.js" charset="UTF-8"></script>
    <script src="js/panel.js" charset="UTF-8"></script>
    <script src="js/ui.js" charset="UTF-8"></script>
    <script src="js/main.js" charset="UTF-8"></script>
</body>
</html>
