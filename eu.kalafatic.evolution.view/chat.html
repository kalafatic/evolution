<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Evolution Chat</title>

    <!-- CSS Modules -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/messages.css">
    <link rel="stylesheet" href="css/branches.css">
    <link rel="stylesheet" href="css/panel.css">
    <link rel="stylesheet" href="css/animations.css">

    <script>
        // Diagnostic JavaLog Bridge
        window.onerror = function(msg, url, line, col, error) {
            if (window.JavaLog) window.JavaLog('[JS Error] ' + msg + ' at ' + line + ':' + col);
            return false;
        };

        // Resilience: fallback for loading overlay
        window.hideLoading = function() {
            var overlay = document.getElementById('loading-overlay');
            if (overlay) overlay.style.display = 'none';
        };
        setTimeout(window.hideLoading, 5000);
    </script>
</head>
<body class="full">
    <div id="loading-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center; font-family: sans-serif; color: #64748b;">
        <div style="text-align: center;">
            <div class="thinking" style="margin: 0 auto 12px auto; display: flex;">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div>Initializing AI Intelligence...</div>
        </div>
    </div>

    <div id="floating-quote-btn" onclick="quoteSelection()">Quote</div>

    <div id="chat-layout" style="display: flex; height: 100vh; width: 100vw; overflow: hidden;">
        <div id="main-content" style="flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden;">
            <div class='chat-container' id='chat' style="flex: 1; overflow-y: auto; padding: 8px;">
                <div id="messages-wrapper" style="display: flex; flex-direction: column; gap: 4px;"></div>
                <div id='thinking' style='display:none; margin-top: 12px;'>
                    <div class='thinking'>
                        <div class='dot'></div>
                        <div class='dot'></div>
                        <div class='dot'></div>
                    </div>
                </div>
            </div>
            <div id="nav-controls">
                <button class="nav-btn" onclick="scrollToTop()" title="Scroll to Top">↑</button>
                <button class="nav-btn" onclick="scrollToBottom()" title="Scroll to Bottom">↓</button>
            </div>
        </div>

        <div id="side-panel">
            <div id="resize-handle"></div>
            <div class="side-panel-header">
                <div class="side-panel-title-row">
                    <span id="side-panel-title" style="font-weight: bold; font-size: 12px; color: #64748b;">CHANGES</span>
                    <div class="side-panel-actions">
                        <button class="panel-btn" onclick="toggleAllFiles()" title="Toggle All">↕️</button>
                        <button class="panel-btn" onclick="window.ChatApp.Actions.callJava('refreshGit')" title="Refresh">🔄</button>
                        <button class="panel-btn" onclick="downloadZip()" title="Download ZIP">📦</button>
                        <button class="panel-btn" onclick="window.ChatApp.Actions.callJava('executeProposal', '-1', 'openPeerReview')" title="Open Peer Review">⚖️</button>
                        <button class="panel-btn" onclick="toggleSidePanel()" title="Close Panel">✕</button>
                    </div>
                </div>
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="Search files..." oninput="filterFiles(this.value)">
                </div>
            </div>
            <div id="changes-list" style="flex: 1; overflow-y: auto; padding: 10px;">
                <!-- Changed files will be listed here -->
            </div>
            <div id="side-panel-footer" style="padding: 10px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px;">
                <button onclick="commitChanges()" style="width: 100%; padding: 8px; background: #16a34a; color: white; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer;">Commit Changes</button>
            </div>
        </div>

        <div id="context-menu">
            <div class="menu-item" onclick="menuAction('workspace')"><span class="menu-icon">🏢</span> Open in Workspace</div>
            <div class="menu-item" onclick="menuAction('review')"><span class="menu-icon">📝</span> Open in Review Editor</div>
            <div class="menu-separator"></div>
            <div class="menu-item" style="color: #dc2626;" onclick="menuAction('revert')"><span class="menu-icon">⏪</span> Revert Change</div>
            <div class="menu-separator"></div>
            <div class="menu-item" onclick="menuAction('copyPath')"><span class="menu-icon">📋</span> Copy Path</div>
        </div>
    </div>

    <!-- JS Modules (Non-ESM) -->
    <script src="js/constants.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/actions.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/panel.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
