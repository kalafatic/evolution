<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="full">
    <div id="floating-quote-btn" onclick="quoteSelection()">Quote</div>
    <div style="display: flex; height: 100vh;">
        <div style="flex: 1; position: relative; display: flex; flex-direction: column; overflow: hidden;">
            <div class='chat-container' id='chat' style="flex: 1; overflow-y: auto; padding: 8px;">
                <div id="messages-wrapper" style="display: flex; flex-direction: column; gap: 4px;"></div>
                <div id='thinking' style='display:none; margin-top: 12px;'>
                    <div class='thinking'>
                        <div class='dot'></div>
                        <div class='dot'></div>
                        <div class='dot'></div>
                    </div>
                </div>
            </div>
            <div id="nav-controls">
                <button class="nav-btn" onclick="scrollToTop()" title="Scroll to Top">↑</button>
                <button class="nav-btn" onclick="scrollToBottom()" title="Scroll to Bottom">↓</button>
            </div>
        </div>

        <div id="side-panel" style="position: relative; width: 320px; background: #fff; border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: width 0.3s ease;">
            <div id="resize-handle"></div>
            <div class="side-panel-header">
                <div class="side-panel-title-row">
                    <span id="side-panel-title" style="font-weight: bold; font-size: 12px; color: #64748b;">CHANGES</span>
                    <div class="side-panel-actions">
                        <button class="panel-btn" onclick="toggleAllFiles()" title="Toggle All">↕️</button>
                        <button class="panel-btn" onclick="JavaHandler('refreshGit', '0', '')" title="Refresh">🔄</button>
                        <button class="panel-btn" onclick="downloadZip()" title="Download ZIP">📦</button>
                        <button class="panel-btn" onclick="JavaHandler('openPeerReview', '0', '')" title="Open Peer Review">⚖️</button>
                        <button class="panel-btn" onclick="toggleSidePanel()" title="Close Panel">✕</button>
                    </div>
                </div>
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="Search files..." oninput="filterFiles(this.value)">
                </div>
            </div>
            <div id="changes-list" style="flex: 1; overflow-y: auto; padding: 10px;">
                <!-- Changed files will be listed here -->
            </div>
            <div id="side-panel-footer" style="padding: 10px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; gap: 8px;">
                    <button onclick="commitChanges()" style="flex: 1; padding: 8px; background: #16a34a; color: white; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer;">Commit Changes</button>
                </div>
            </div>
        </div>

        <div id="context-menu">
            <div class="menu-item" onclick="menuAction('workspace')"><span class="menu-icon">🏢</span> Open in Workspace</div>
            <div class="menu-item" onclick="menuAction('review')"><span class="menu-icon">📝</span> Open in Review Editor</div>
            <div class="menu-separator"></div>
            <div class="menu-item" style="color: #dc2626;" onclick="menuAction('revert')"><span class="menu-icon">⏪</span> Revert Change</div>
            <div class="menu-separator"></div>
            <div class="menu-item" onclick="menuAction('copyPath')"><span class="menu-icon">📋</span> Copy Path</div>
            <div class="menu-item" onclick="menuAction('copyDiff')"><span class="menu-icon">🔍</span> Copy Diff</div>
        </div>
    </div>

    <script>
        // Emergency bootloader: queue calls until modules are ready
        window._evoQueue = [];
        window.updateMessages = (m) => window._evoQueue.push({ fn: 'updateMessages', args: [m] });
        window.updateChanges = (c) => window._evoQueue.push({ fn: 'updateChanges', args: [c] });
        window.showDiff = (d) => window._evoQueue.push({ fn: 'showDiff', args: [d] });
        window.showThinking = (s) => window._evoQueue.push({ fn: 'showThinking', args: [s] });
        window.setFeedbackLevel = (l) => window._evoQueue.push({ fn: 'setFeedbackLevel', args: [l] });
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
