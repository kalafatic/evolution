<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="workflow.css">
    <script src="d3.v7.min.js"></script>
</head>
<body class="xp-bg">
    <div class="window-frame" style="width: 100%; height: 100%; border:none; border-radius:0;">
        <div class="title-bar">
            <div class="title-text">Workflow Monitor</div>
            <div class="title-controls">
                <button class="control-btn minimize">_</button>
                <button class="control-btn maximize">□</button>
            </div>
        </div>
        <div style="flex:1; background: white; overflow: hidden; position: relative;">
    <div id="workflow-container">
        <svg id="workflow-svg"></svg>
    </div>
    <div id="controls" style="position: absolute; bottom: 10px; right: 10px; z-index: 10;">
        <button onclick="resetZoom()">Reset</button>
    </div>
        </div>
    </div>
    <script src="workflow.js"></script>
</body>
</html>
